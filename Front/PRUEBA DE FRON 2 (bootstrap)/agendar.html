<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar w/ text</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Pricing</a>
                    </li>
                </ul>
                <span class="navbar-text">
                    Navbar text with an inline element
                </span>
            </div>
        </div>
    </nav>
    <!--Fin nav-->
    <div class="container">
        <h2>Agenda tu hora</h2>
        <form action="#" method="post" class="row g-3">
            <label for="txt_nombre">Nombre completo</label>
            <input type="text" class="form-control" name="txt_nombre" id="txt_nombre">
            <label for="txt_correo">Correo electronico</label>
            <input type="email" class="form-control" name="txt_correo" id="txt_correo"
                placeholder="sucorreo@dominio.com">
            <label for="txt_telefono">Telefono</label>
            <input type="text" class="form-control" name="txt_telefono" id="txt_telefono" placeholder="+569 1234 4567">
            <label for="txt_patente">Patente</label>
            <input type="text" class="form-control" name="txt_patente" id="txt_patente" placeholder="AB-12-34">
            <div class="row">
                <div class="col">
                    <label for="date_dia_solicitado">Dia</label>
                    <input type="date" class="form-control" name="date_dia_solicitado" id="date_dia_solicitado">
                </div>
                <div class="col">
                    <label for="date_hora_solicitada">Dia</label>
                    <input type="time" class="form-control" name="date_hora_solicitada" id="date_hora_solicitada">
                </div>
            </div>
    </div>
    </form>
    <hr><br>
    tipo
    kilometraje
    </div>

    <!--Fin carrusel-->


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
        crossorigin="anonymous"></script>
</body>

</html>
